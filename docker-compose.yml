version: "3.9"

# À utiliser SUR LE VPS OVH (vps-02b5d7ab
# Accès direct par IP (213.32.21.79), pas de nom de domaine / HTTPS pour l'instant.
# Héberge : Next.js (front) + Strapi (CMS) + PostgreSQL + Matomo (analytics)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fnp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fnp_internal

  strapi:
    image: lorlaviedevdesign/fnp-strapi:latest
    container_name: fnp_strapi
    restart: always
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      # Pas de nom de domaine : on référence directement l'IP + port
      URL: http://213.32.21.79:1337
    networks:
      - fnp_internal
    ports:
      - "1337:1337"

  nextjs:
    image: lorlaviedevdesign/fnp-nextjs:latest
    container_name: fnp_nextjs
    restart: always
    depends_on:
      - strapi
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_STRAPI_URL: http://213.32.21.79:1337
    networks:
      - fnp_internal
    ports:
      - "3000:3000"

  matomo_db:
    image: mariadb:11
    container_name: fnp_matomo_db
    restart: always
    environment:
      MYSQL_DATABASE: matomo
      MYSQL_USER: ${MATOMO_DB_USER}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql
    networks:
      - fnp_internal

  matomo:
    image: matomo:latest
    container_name: fnp_matomo
    restart: always
    depends_on:
      - matomo_db
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_DBNAME: matomo
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo_data:/var/www/html
    networks:
      - fnp_internal
    ports:
      - "8080:80"

networks:
  fnp_internal:
  fnp_public:

volumes:
  postgres_data:
  strapi_uploads:
  matomo_db_data:
  matomo_data: