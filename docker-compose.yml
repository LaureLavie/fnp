version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fnp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-fnp_strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-fnp_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-fnp_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    container_name: fnp_strapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-fnp_strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-fnp_admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
    volumes:
      - ./strapi:/opt/app
      - /opt/app/node_modules
      - strapi_uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"

  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile.dev
    container_name: fnp_nextjs
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_STRAPI_URL: http://localhost:1337
    volumes:
      - ./nextjs:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  strapi_uploads: