# Environnement de TRAVAIL (staging) — sous-domaine dev, isolé du vrai site
# DNS à créer chez OVH (enregistrements A vers 213.32.21.79) :
#   dev.fabriquenumerique.fr
#   cms.dev.fabriquenumerique.fr
#   stats.dev.fabriquenumerique.fr

# --- Frontend Next.js (staging) ---
server {
    listen 80;
    server_name dev.fabriquenumerique.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.fabriquenumerique.fr;

    ssl_certificate /etc/letsencrypt/live/dev.fabriquenumerique.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.fabriquenumerique.fr/privkey.pem;

    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

