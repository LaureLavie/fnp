version: "3.9"

# À utiliser SUR LE VPS OVH (vps-02b5d7ab.vps.ovh.net)
# Environnement de TRAVAIL (staging), séparé du vrai site en prod.
# Héberge : Next.js (front) + Strapi (CMS) + PostgreSQL + Matomo (analytics)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fnp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fnp_internal

  strapi:
    image: lorlaviedevdesign/fnp-strapi:latest
    container_name: fnp_strapi
    restart: always
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      URL: https://cms.dev.fabriquenumerique.fr
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    networks:
      - fnp_internal
      - fnp_public
    expose:
      - "1337"

  nextjs:
    image: lorlaviedevdesign/fnp-nextjs:latest
    container_name: fnp_nextjs
    restart: always
    depends_on:
      - strapi
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_STRAPI_URL: https://cms.dev.fabriquenumerique.fr
    networks:
      - fnp_internal
      - fnp_public
    expose:
      - "3000"

  matomo_db:
    image: mariadb:11
    container_name: fnp_matomo_db
    restart: always
    environment:
      MYSQL_DATABASE: matomo
      MYSQL_USER: ${MATOMO_DB_USER}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql
    networks:
      - fnp_internal

  matomo:
    image: matomo:latest
    container_name: fnp_matomo
    restart: always
    depends_on:
      - matomo_db
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_DBNAME: matomo
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo_data:/var/www/html
    networks:
      - fnp_internal
      - fnp_public
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: fnp_nginx
    restart: always
    depends_on:
      - strapi
      - nextjs
      - matomo
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - fnp_public

  certbot:
    image: certbot/certbot
    container_name: fnp_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  fnp_internal:
    internal: true
  fnp_public:

volumes:
  postgres_data:
  strapi_uploads:
  matomo_db_data:
  matomo_data: